name: Build Release On Tag

on:
  push:
    tags:
      - "v*"
      - "V*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: LocalNtpTool-windows
            archive_ext: zip
          - os: ubuntu-latest
            artifact_name: LocalNtpTool-linux
            archive_ext: tar.gz
          - os: macos-latest
            artifact_name: LocalNtpTool-macos
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv/Scripts/python.exe -m pip install --upgrade pip
            .venv/Scripts/python.exe -m pip install -r requirements.txt
          else
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r requirements.txt
          fi

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: ./build.ps1

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./build.sh

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/LocalNtpTool/* -DestinationPath dist/${{ matrix.artifact_name }}.zip -Force

      - name: Archive Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -C dist -czf "dist/${{ matrix.artifact_name }}.tar.gz" LocalNtpTool

      - name: Archive macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/LocalNtpTool "dist/${{ matrix.artifact_name }}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show downloaded files
        shell: bash
        run: find release-assets -maxdepth 2 -type f

      - name: Publish archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
          generate_release_notes: true
